<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raj Maitra</title>
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #0d0d0d;
            --bg-tertiary: #111111;
            --text-primary: #e0e0e0;
            --text-secondary: #aaaaaa;
            --text-tertiary: #888888;
            --text-quaternary: #555555;
            --border-primary: #1e1e1e;
            --border-secondary: #1e1e1e;
            --border-tertiary: #161616;
            --accent-primary: #4a9eff;
            --accent-secondary: #3a8ef0;
            --accent-tertiary: #6eb4ff;
            --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.5);
            --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 4px 16px rgba(0, 0, 0, 0.6);
            --hover-bg: #111111;
            --table-hover: #0d0d0d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .navbar {
            background: #000000;
            color: var(--text-primary);
            padding: 20px 40px;
            top: 0;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .navbar-title {
            font-size: 1.8em;
            font-weight: 700;
            margin: 0 0 5px 0;
        }

        .cards-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--bg-primary);
            border: 1px solid var(--border-primary);
            border-radius: 8px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            font-size: small;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--accent-primary);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            z-index: 0;
        }

        .card > * {
            position: relative;
            z-index: 1;
        }

        .card-title {
            font-weight: 200;
            margin-bottom: 0.75rem;
        }

        .card-description {
            color: var(--text-tertiary);
            line-height: 1.6;
            margin-bottom: 0;
        }

        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-tertiary);
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border-primary);
            border-top: 4px solid var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 15px 20px;
            }

            .navbar-title {
                font-size: 1.5em;
            }
        }

        .text-muted{
            color:#888;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1 class="navbar-title">rmaitra</h1>
    </nav>

    <div class="cards-container">
        <div id="loadingState" class="loading">
            <div class="loading-spinner"></div>
            <p>Loading...</p>
        </div>
        <div class="text-muted">Various projects by Raj Maitra</div>
        <div id="categoriesContainer"></div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('./artifacts.json');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const artifacts = await response.json();
                document.getElementById('loadingState').style.display = 'none';
                renderCards(artifacts);
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('loadingState').style.display = 'none';
            }
        }

        function renderCards(artifacts) {
            const container = document.getElementById('categoriesContainer');
            const categorized = {};
            artifacts.forEach(artifact => {
                const category = artifact.category || '';
                if (!categorized[category]) categorized[category] = [];
                categorized[category].push(artifact);
            });

            Object.keys(categorized).sort().forEach(category => {
                const section = document.createElement('div');
                section.className = 'category-section';

                const title = document.createElement('h2');
                title.className = 'category-title';
                title.textContent = category;
                section.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'cards-grid';

                categorized[category].forEach(artifact => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => window.location.href = artifact.link;
                    card.innerHTML = `
                        <h2 class="card-title">${artifact.title}</h2>
                        <p class="card-description">${artifact.description}</p>
                    `;
                    if (artifact.image) card.style.backgroundImage = `url('${artifact.image}')`;
                    grid.appendChild(card);
                });

                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        loadData();
    </script>
</body>
</html>
