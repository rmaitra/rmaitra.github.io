<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>rmaitra.github.io</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #000000;
            --bg-secondary: #0d0d0d;
            --text-primary: #e0e0e0;
            --text-secondary: #aaaaaa;
            --text-tertiary: #888888;
            --border-primary: #1e1e1e;
            --accent-primary: #4a9eff;
            --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.7);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .navbar {
            background: #000;
            padding: 22px 40px;
            display: flex;
            align-items: center;
        }

        .navbar-title {
            font-size: 1.9em;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .cards-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 1.6rem 1.5rem;
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s ease, border-color 0.2s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            min-height: 140px;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: var(--shadow-lg);
            border-color: rgba(255,255,255,0.22);
        }

        .card-svg {
            position: absolute;
            bottom: -12px;
            right: -12px;
            width: 140px;
            height: 140px;
            pointer-events: none;
            z-index: 0;
        }

        .card-svg svg {
            width: 100%;
            height: 100%;
        }

        .card-body {
            position: relative;
            z-index: 1;
        }

        .card-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            margin: 0 0 0.6rem 0;
            color: #fff;
            letter-spacing: -0.2px;
        }

        .card-description {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 300;
            color: rgba(255,255,255,0.6);
            font-size: 0.82rem;
            line-height: 1.6;
            margin: 0;
        }

        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-tertiary);
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border-primary);
            border-top: 4px solid var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .navbar { padding: 15px 20px; }
            .navbar-title { font-size: 1.5em; }
        }
    </style>
</head>

        async function loadData() {
            try {
                const response = await fetch('./artifacts.json');
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const artifacts = await response.json();
                document.getElementById('loadingState').style.display = 'none';
                renderCards(artifacts);
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('loadingState').style.display = 'none';
            }
        }

        function renderCards(artifacts) {
            const container = document.getElementById('categoriesContainer');
            const categorized = {};
            artifacts.forEach(artifact => {
                const category = artifact.category || '';
                if (!categorized[category]) categorized[category] = [];
                categorized[category].push(artifact);
            });

            Object.keys(categorized).sort().forEach(category => {
                const section = document.createElement('div');
                section.className = 'category-section';

                const title = document.createElement('h2');
                title.className = 'category-title';
                section.appendChild(title);

                const grid = document.createElement('div');
                grid.className = 'cards-grid';

                categorized[category].forEach(artifact => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => window.location.href = artifact.link;
                    if (artifact.gradient) card.style.background = artifact.gradient;

                    const svgMarkup = CARD_SVGS[artifact.title] || '';
                    card.innerHTML = `
                        <div class="card-body">
                            <h2 class="card-title">${artifact.title}</h2>
                            <p class="card-description">${artifact.description}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                section.appendChild(grid);
                container.appendChild(section);
            });
        }
