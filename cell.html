            // ═══════════════════════════════════════════════════════════════
            // CELL FACTORY
            // ═══════════════════════════════════════════════════════════════
            let currentComponents = [];

            function clearCell() {
                pickables = [];
                currentComponents.forEach((c) => c.remove());
                currentComponents = [];
                membraneWaveMesh    = null;
                membraneWaveOrigPos = null;
            }

            function buildAnimalCell() {
                clearCell();
                const components = [];

                components.push(new CytoplasmParticles(scene, 700, 3600));
                components.push(new CellMembrane(scene, 3750));

                const nucleus = new Nucleus(scene, new THREE.Vector3(-200, 200, 0), 1000);
                components.push(nucleus);

                const er = new EndoplasmicReticulum(scene, true);
                components.push(er);
                const ser = new EndoplasmicReticulum(scene, false);
                components.push(ser);

                const golgi = new GolgiApparatus(scene, new THREE.Vector3(1600, -400, 800));
                components.push(golgi);

                // Mitochondria
                const mitoPositions = [
                    new THREE.Vector3(-2200, 800, 500),
                    new THREE.Vector3(2000, 1200, -1000),
                    new THREE.Vector3(-1500, -1500, 1200),
                    new THREE.Vector3(1000, -1800, -1400),
                    new THREE.Vector3(-800, 2000, -1600),
                    new THREE.Vector3(2200, -800, 1400),
                    new THREE.Vector3(-2000, 600, -2000),
                    new THREE.Vector3(600, 1600, 2200),
                ];
                mitoPositions.forEach((pos) => {
                    components.push(new Mitochondrion(scene, pos, 0.9 + Math.random() * 0.4));
                });

                // Lysosomes
                for (let i = 0; i < 7; i++) {
                    const angle = (i / 7) * Math.PI * 2;
                    const r = 1800 + Math.random() * 800;
                    components.push(
                        new Lysosome(
                            scene,
                            new THREE.Vector3(
                                r * Math.cos(angle) + (Math.random() - 0.5) * 400,
                                (Math.random() - 0.5) * 2000,
                                r * Math.sin(angle) + (Math.random() - 0.5) * 400
                            )
                        )
                    );
                }

                // Vacuoles
                for (let i = 0; i < 4; i++) {
                    const v = new Vacuole(
                        scene,
                        new THREE.Vector3(
                            (Math.random() - 0.5) * 2800,
                            (Math.random() - 0.5) * 2800,
                            (Math.random() - 0.5) * 2800
                        ),
                        250 + Math.random() * 200
                    );
                    components.push(v);
                }

                // Peroxisomes
                for (let i = 0; i < 5; i++) {
                    components.push(
                        new Peroxisome(
                            scene,
                            new THREE.Vector3(
                                (Math.random() - 0.5) * 3000,
                                (Math.random() - 0.5) * 3000,
                                (Math.random() - 0.5) * 3000
                            )
                        )
                    );
                }

                // Free ribosomes
                for (let i = 0; i < 80; i++) {
                    const base = new CellComponent(scene);
                    const pos = base.randomInSphere(3400);
                    const r = new Ribosome(scene, pos);
                    r.create();
                    components.push(r);
                }

                components.forEach((c) => c.create && c.create());
                currentComponents = components;
                boostEmissive();
                collectOpacityMaterials();

                return [
                    { name: "Cell Membrane", color: 0x00d4ff },
                    { name: "Nucleus", color: 0x7b2fff },
                    { name: "Mitochondria", color: 0xff6622 },
                    { name: "Rough ER", color: 0x00ffaa },
                    { name: "Golgi Apparatus", color: 0xff44aa },
                    { name: "Lysosomes", color: 0xff2266 },
                    { name: "Vacuoles", color: 0x2266cc },
                    { name: "Ribosomes", color: 0xffcc00 },
                    { name: "Peroxisomes", color: 0xffaa00 },
                    { name: "Cytoplasm", color: 0x224466 },
                ];
            }

            function buildPlantCell() {
                clearCell();
                const components = [];

                components.push(new CytoplasmParticles(scene, 700, 3600));
                components.push(new CellWall(scene, 4200));
                components.push(new CellMembrane(scene, 3750));

                const nucleus = new Nucleus(scene, new THREE.Vector3(-300, 1000, 500), 900);
                components.push(nucleus);

                // Large central vacuole — ~2 µm radius = 1000 units
                const cv = new Vacuole(scene, new THREE.Vector3(0, -200, 0), 1800, true);
                components.push(cv);

                // Chloroplasts
                const chloroPositions = [
                    new THREE.Vector3(-2800, 500, 0),
                    new THREE.Vector3(2800, 500, 0),
                    new THREE.Vector3(0, 500, -2800),
                    new THREE.Vector3(0, 500, 2800),
                    new THREE.Vector3(-2000, 1800, -1500),
                    new THREE.Vector3(2000, 1800, 1500),
                    new THREE.Vector3(-1500, -1800, 2000),
                    new THREE.Vector3(2000, -1800, -1800),
                ];
                chloroPositions.forEach((pos) => {
                    components.push(new Chloroplast(scene, pos));
                });

                // Mitochondria (fewer than animal)
                for (let i = 0; i < 5; i++) {
                    const a = (i / 5) * Math.PI * 2;
                    components.push(
                        new Mitochondrion(
                            scene,
                            new THREE.Vector3(2500 * Math.cos(a), (Math.random() - 0.5) * 1200, 2500 * Math.sin(a)),
                            0.85
                        )
                    );
                }

                const er = new EndoplasmicReticulum(scene, true);
                components.push(er);

                const golgi = new GolgiApparatus(scene, new THREE.Vector3(-1800, 1200, -1000));
                components.push(golgi);

                for (let i = 0; i < 60; i++) {
                    const base = new CellComponent(scene);
                    const r = new Ribosome(scene, base.randomInSphere(3600));
                    r.create();
                    components.push(r);
                }

                components.forEach((c) => c.create && c.create());
                currentComponents = components;
                boostEmissive();
                collectOpacityMaterials();

                return [
                    { name: "Cell Wall", color: 0x88cc44 },
                    { name: "Cell Membrane", color: 0x00d4ff },
                    { name: "Nucleus", color: 0x7b2fff },
                    { name: "Chloroplasts", color: 0x22dd55 },
                    { name: "Central Vacuole", color: 0x44aaff },
                    { name: "Mitochondria", color: 0xff6622 },
                    { name: "Golgi Apparatus", color: 0xff44aa },
                    { name: "Rough ER", color: 0x00ffaa },
                    { name: "Ribosomes", color: 0xffcc00 },
                    { name: "Cytoplasm", color: 0x224466 },
                ];
            }

            function buildBacterium() {
                clearCell();
                const components = [];

                components.push(new BacterialMembrane(scene));

                // Scale cytoplasm to rod shape handled by particles
                const cyt = new CytoplasmParticles(scene, 400, 1800);
                const oldCreate = cyt.create.bind(cyt);
                cyt.create = function () {
                    const count = 400;
                    const positions = new Float32Array(count * 3);
                    for (let i = 0; i < count; i++) {
                        const v = this.randomInSphere(1700);
                        positions[i * 3] = v.x * 2.2;
                        positions[i * 3 + 1] = v.y;
                        positions[i * 3 + 2] = v.z;
                    }
                    const geo = new THREE.BufferGeometry();
                    geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
                    const mat = new THREE.PointsMaterial({
                        color: 0x113322,
                        size: 20,
                        sizeAttenuation: true,
                        transparent: true,
                        opacity: 0.6,
                        blending: THREE.AdditiveBlending,
                        depthWrite: false,
                    });
                    this.addObject(new THREE.Points(geo, mat));
                };
                components.push(cyt);

                components.push(new Nucleoid(scene));
                components.push(new BacterialFlagellum(scene));
                components.push(new Pili(scene));

                // Many ribosomes (prokaryotes are packed with them)
                for (let i = 0; i < 120; i++) {
                    const base = new CellComponent(scene);
                    const v = base.randomInSphere(1600);
                    const r = new Ribosome(scene, new THREE.Vector3(v.x * 2.2, v.y, v.z));
                    r.create();
                    components.push(r);
                }

                // Inclusion bodies (storage granules) — ~200-400 nm = 100-200 units
                for (let i = 0; i < 5; i++) {
                    const v = new CellComponent(scene);
                    const pos = v.randomInSphere(1400);
                    pos.x *= 2;
                    const geo = new THREE.SphereGeometry(100 + Math.random() * 80, 10, 10);
                    const mat = new THREE.MeshPhongMaterial({
                        color: 0x88aaff,
                        emissive: 0x111133,
                        transparent: true,
                        opacity: 0.75,
                    });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.copy(pos);
                    mesh.userData.info = {
                        name: "Inclusion Body",
                        desc: "Granule storing energy reserves like glycogen or polyhydroxyalkanoate.",
                    };
                    pickables.push(mesh);
                    scene.add(mesh);
                    components.push({
                        remove: () => {
                            scene.remove(mesh);
                            mesh.geometry.dispose();
                            mesh.material.dispose();
                        },
                        create: () => {},
                    });
                }

                components.forEach((c) => c.create && c.create());
                currentComponents = components;
                boostEmissive();
                collectOpacityMaterials();

                return [
                    { name: "Cell Wall (Peptidoglycan)", color: 0x66ffaa },
                    { name: "Nucleoid (DNA)", color: 0xcc88ff },
                    { name: "Flagellum", color: 0x44ffcc },
                    { name: "Pili", color: 0xffeebb },
                    { name: "Ribosomes", color: 0xffcc00 },
                    { name: "Inclusion Bodies", color: 0x88aaff },
                    { name: "Cytoplasm", color: 0x113322 },
                ];
            }

            // ── Emissive Boost ────────────────────────────────────────────
            // After building a cell, traverse every mesh and set emissive to
            // 45% of its diffuse color.  This guarantees organelles self-illuminate
            // and are readable from any angle, regardless of light position.
            // Membrane materials (tagged _baseOpacity) and BasicMaterial (no emissive
            // property) are skipped automatically.
            function boostEmissive() {
                scene.traverse((obj) => {
                    if (!obj.isMesh) return;
                    const mat = obj.material;
                    if (!mat || mat._baseOpacity !== undefined) return; // skip membrane fade mats
                    if (!mat.emissive) return;                           // skip MeshBasicMaterial
                    if (mat._isBilayer) return;                          // skip bilayer molecules
                    mat.emissive.copy(mat.color).multiplyScalar(0.45);
                });
            }

            // ── Opacity group tracking ────────────────────────────────────
            // Maps legend name → [{mat, nativeOpacity}] for slider control.
            let opacityGroups = {};

            function collectOpacityMaterials() {
                opacityGroups = {};
                currentComponents.forEach((c) => {
                    if (!c.opacityGroup || !c.objects) return;
                    const grp = c.opacityGroup;
                    if (!opacityGroups[grp]) opacityGroups[grp] = [];
                    c.objects.forEach((obj) => {
                        obj.traverse((child) => {
                            if (!child.material) return;
                            const mats = Array.isArray(child.material) ? child.material : [child.material];
                            mats.forEach((m) => {
                                if (m._baseOpacity !== undefined) return; // shell-fade materials
                                if (m.wireframe) return;
                                if (m.side === THREE.BackSide) return;    // glow shells
                                if (opacityGroups[grp].some((e) => e.mat === m)) return;
                                opacityGroups[grp].push({ mat: m, nativeOpacity: m.opacity });
                            });
                        });
                    });
                });
            }

            // ── Legend Builder ────────────────────────────────────────────
            function buildLegend(items) {
                legendItems.innerHTML = "";
                items.forEach((item) => {
                    const div = document.createElement("div");
                    div.className = "legend-item";
                    const hex = "#" + item.color.toString(16).padStart(6, "0");
                    div.innerHTML = `
      <div class="legend-dot" style="background:${hex}; box-shadow: 0 0 6px ${hex}"></div>
      <span class="legend-label">${item.name}</span>
      <input type="range" class="opacity-slider" min="0" max="100" step="1" value="100" data-group="${item.name}" title="Opacity">
    `;
                    legendItems.appendChild(div);
                });
                legendItems.querySelectorAll(".opacity-slider").forEach((slider) => {
                    slider.addEventListener("input", (e) => {
                        const v = parseInt(e.target.value) / 100;
                        const entries = opacityGroups[e.target.dataset.group];
                        if (!entries) return;
                        entries.forEach(({ mat, nativeOpacity }) => {
                            mat.opacity = nativeOpacity * v;
                        });
                    });
                });
            }

            // ── Cell Type Switch ──────────────────────────────────────────
            let currentCellType = "animal";

            const cellBuilders = {
                animal: buildAnimalCell,
                plant: buildPlantCell,
                bacteria: buildBacterium,
            };

            document.querySelectorAll(".cell-tab").forEach((tab) => {
                tab.addEventListener("click", () => {
                    const type = tab.dataset.type;
                    if (type === currentCellType) return;
                    currentCellType = type;
                    document.querySelectorAll(".cell-tab").forEach((t) => t.classList.remove("active"));
                    tab.classList.add("active");

                    // Reset camera
                    camState.position.set(0, 0, 3760);
                    camState.velocity.set(0, 0, 0);
                    camState.yaw = 0;
                    camState.pitch = 0;

                    const legendData = cellBuilders[type]();
                    buildLegend(legendData);
                    applyCameraOrbit();
                });
            });

            // ── Tooltip & Raycasting ─────────────────────────────────────
            function updateTooltip(e) {
                raycaster.setFromCamera(mouse, camera);
                const hits = raycaster.intersectObjects(pickables, false);
                if (hits.length > 0 && hits[0].object.userData.info) {
                    const info = hits[0].object.userData.info;
                    ttName.textContent = info.name;
                    ttDesc.textContent = info.desc;
                    tooltip.style.display = "block";
                    tooltip.style.left = e.clientX + 16 + "px";
                    tooltip.style.top = e.clientY + 16 + "px";
                    // Clamp to viewport
                    const r = tooltip.getBoundingClientRect();
                    if (r.right > window.innerWidth - 10) tooltip.style.left = e.clientX - r.width - 10 + "px";
                    if (r.bottom > window.innerHeight - 10) tooltip.style.top = e.clientY - r.height - 10 + "px";
                } else {
                    tooltip.style.display = "none";
                }
            }
            window.addEventListener("mousemove", updateTooltip);

            // ── Animate rotating organelle lights ────────────────────────
            let t = 0;
            function animateLights() {
                t += 0.005;
                pLight1.position.set(3000 * Math.sin(t * 0.5), 2000, 3000 * Math.cos(t * 0.5));
                pLight2.position.set(-2000 * Math.cos(t * 0.3), -1000 * Math.sin(t * 0.7), 2000 * Math.sin(t * 0.3));
            }

            // ── Render Loop ───────────────────────────────────────────────
            function animate() {
                animFrame = requestAnimationFrame(animate);
                handleFlyKeys();
                updateSpotlight();
                animateLights();

                // Slowly pulse ambient
                ambient.intensity = 1.8 + Math.sin(t * 2) * 0.1;

                // ── Membrane wave deformation ─────────────────────────────
                // Purely radial displacement so vertex normals stay correct.
                if (membraneWaveMesh) {
                    const pos  = membraneWaveMesh.geometry.attributes.position;
                    const orig = membraneWaveOrigPos;
                    const R    = membraneWaveRadius;
                    const A    = R * 0.006; // amplitude ≈ 0.6% of radius
                    for (let vi = 0, vn = pos.count; vi < vn; vi++) {
                        const i3 = vi * 3;
                        const ox = orig[i3], oy = orig[i3 + 1], oz = orig[i3 + 2];
                        const nx = ox / R,   ny = oy / R,        nz = oz / R;
                        const w  = A * (
                            Math.sin(6.0 * (nx + 0.3 * ny) + 1.2 * t        ) * 0.50 +
                            Math.sin(4.5 * (nz - 0.5 * ny) + 0.7 * t + 1.7  ) * 0.35 +
                            Math.sin(7.0 * (0.6 * nx - 0.8 * nz) + 1.0 * t + 4.1) * 0.25
                        );
                        const r = 1 + w / R;
                        pos.array[i3]     = ox * r;
                        pos.array[i3 + 1] = oy * r;
                        pos.array[i3 + 2] = oz * r;
                    }
                    pos.needsUpdate = true;
                }

                // ── Organelle drift + lipid shells ────────────────────────
                currentComponents.forEach((c) => c.update && c.update(t));

                // ── Depth-of-field update ─────────────────────────────────
                // linear depth = dist / farClip  (camera.far = 10000)
                {
                    const camDist = camera.position.length();
                    const memR    = currentMemRadius;
                    const distOut = camDist - memR; // positive = outside cell

                    let targetFocus, targetMaxblur;
                    if (distOut >= 0) {
                        // Outside: focal plane sits on the membrane surface.
                        // Everything deeper inside the cell drifts out of focus.
                        targetFocus   = Math.max(8, distOut);  // scene units: focal plane on membrane
                        targetMaxblur = dofMaxblur + 0.001;
                    } else {
                        // Inside: focal plane near the camera so closer = sharper,
                        // farther = progressively blurrier.
                        targetFocus   = dofFocusInside;
                        targetMaxblur = dofMaxblur;
                    }
                    // Smooth the focal distance to avoid sudden jumps during transitions.
                    const cf = bokehPass.uniforms['focus'].value;
                    bokehPass.uniforms['focus'].value    = cf + (targetFocus - cf) * 0.06;
                    bokehPass.uniforms['aperture'].value = dofAperture;
                    bokehPass.uniforms['maxblur'].value  = targetMaxblur;
                }

                composer.render();

                // Infobar
                const p = camera.position;
                // 1 unit = 2 nm; show position in nm
                infobar.textContent = `POS  x:${(p.x*2).toFixed(0)}nm  y:${(p.y*2).toFixed(0)}nm  z:${(p.z*2).toFixed(0)}nm  |  BEAM ${(beamDist*2).toFixed(0)}nm  |  ${currentCellType.toUpperCase()} CELL`;
            }

            // ── Init ──────────────────────────────────────────────────────
            // ── DOF panel slider wiring ───────────────────────────────────
            document.getElementById('dof-aperture').addEventListener('input', (e) => {
                dofAperture = parseInt(e.target.value) * 0.000001;
                document.getElementById('dof-aperture-val').textContent = (dofAperture * 1e6).toFixed(0) + 'e-6';
            });
            document.getElementById('dof-focus').addEventListener('input', (e) => {
                dofFocusInside = parseInt(e.target.value);
                document.getElementById('dof-focus-val').textContent = dofFocusInside + 'u';
            });
            document.getElementById('dof-maxblur').addEventListener('input', (e) => {
                dofMaxblur = parseInt(e.target.value) / 1000;
                document.getElementById('dof-maxblur-val').textContent = dofMaxblur.toFixed(3);
            });

            applyCameraOrbit();
            const legendData = buildAnimalCell();
            buildLegend(legendData);
            animate();
        </script>
    </body>
</html>
