<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sequencer</title>
    <style>
        :root {
            --bg: #000;
            --surface: #0d0d0d;
            --surface2: #141414;
            --border: #1e1e1e;
            --border2: #2a2a2a;
            --text: #e0e0e0;
            --dim: #444;
            --accent: #4a9eff;
            --red: #e05555;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── Navbar ──────────────────────────────────────────── */
        .navbar {
            padding: 22px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar h1 {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }
        .navbar-hint {
            font-size: 0.7rem;
            color: var(--dim);
            letter-spacing: 0.05em;
        }

        /* ── Controls ────────────────────────────────────────── */
        .controls {
            display: flex;
            align-items: center;
            gap: 28px;
            padding: 14px 32px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.15s;
        }
        .play-btn:hover { opacity: 0.8; }
        .play-btn.playing { background: var(--red); }

        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ctrl-label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--dim);
        }

        .bpm-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 110px;
            height: 3px;
            background: var(--border2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        .bpm-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }
        .bpm-slider::-moz-range-thumb {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
        }
        .bpm-val {
            font-size: 0.68rem;
            color: var(--dim);
            min-width: 40px;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
        }

        .steps-group { display: flex; gap: 4px; }
        .steps-btn {
            padding: 5px 12px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            color: var(--dim);
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.78rem;
            transition: all 0.15s;
        }
        .steps-btn:hover { border-color: var(--accent); color: var(--text); }
        .steps-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        .ctrl-divider {
            width: 1px;
            height: 22px;
            background: var(--border2);
            flex-shrink: 0;
        }

        .filter-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 110px;
            height: 3px;
            background: var(--border2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        .filter-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }
        .filter-slider::-moz-range-thumb {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
        }
        .filter-val {
            font-size: 0.68rem;
            color: var(--dim);
            min-width: 50px;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
        }

        /* ── Sequencer ───────────────────────────────────────── */
        .sequencer { padding: 28px 32px 0; }

        .tracks-scroll { overflow-x: auto; padding-bottom: 32px; }

        .beat-nums {
            display: flex;
            margin-bottom: 8px;
            padding-left: 110px;
        }
        .beat-nums-group {
            display: flex;
            gap: 3px;
            margin-right: 8px;
        }
        .beat-num {
            width: 34px;
            text-align: center;
            font-size: 0.6rem;
            color: #333;
        }
        .beat-num.major { color: #555; }

        /* ── Track row ───────────────────────────────────────── */
        .track {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 7px;
        }

        .track-label {
            width: 96px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--dim);
            flex-shrink: 0;
            text-align: right;
            padding-right: 6px;
        }

        .track-pads { display: flex; }

        .pad-group {
            display: flex;
            gap: 3px;
            margin-right: 8px;
        }
        .pad-group:last-child { margin-right: 0; }

        .pad {
            width: 34px;
            height: 34px;
            border-radius: 3px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.08s, border-color 0.08s;
            user-select: none;
            -webkit-user-select: none;
        }
        .pad:hover { border-color: #3a3a3a; }
        .pad.downbeat { background: #111; }

        .pad.lit {
            background: var(--accent);
            border-color: var(--accent);
        }
        .pad.current {
            background: #17243a;
            border-color: #1f3357;
        }
        .pad.lit.current {
            background: #8ecfff;
            border-color: #8ecfff;
        }

        .track-remove {
            width: 26px;
            height: 26px;
            background: transparent;
            border: 1px solid var(--border2);
            color: #333;
            border-radius: 3px;
            cursor: pointer;
            font-size: 15px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s;
        }
        .track-remove:hover { border-color: var(--red); color: var(--red); }

        .mute-btn {
            width: 26px;
            height: 26px;
            background: transparent;
            border: 1px solid var(--border2);
            color: #333;
            border-radius: 3px;
            cursor: pointer;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.04em;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s;
        }
        .mute-btn:hover { border-color: #555; color: #888; }
        .mute-btn.muted { background: var(--red); border-color: var(--red); color: #fff; }

        /* ── Divider between tracks ──────────────────────────── */
        .tracks-divider {
            height: 1px;
            background: var(--border);
            margin: 10px 0 14px 110px;
        }

        /* ── Empty state ─────────────────────────────────────── */
        .empty-state {
            padding: 64px 32px;
            color: #333;
            font-size: 0.85rem;
            text-align: center;
        }

        /* ── Add sound bar ───────────────────────────────────── */
        .add-area {
            padding: 18px 32px;
            border-top: 1px solid var(--border);
        }
        .add-btn {
            padding: 9px 18px;
            background: transparent;
            border: 1px solid var(--border2);
            color: var(--dim);
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.78rem;
            letter-spacing: 0.06em;
            transition: all 0.15s;
        }
        .add-btn:hover { border-color: var(--accent); color: var(--text); }

        /* ── Modal ───────────────────────────────────────────── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.78);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: 24px;
            width: 320px;
        }
        .modal-title {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--dim);
            margin-bottom: 16px;
        }
        .sound-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }
        .sound-opt {
            padding: 11px 14px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            color: var(--text);
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.82rem;
            text-align: left;
            transition: all 0.15s;
        }
        .sound-opt:hover {
            border-color: var(--accent);
            background: rgba(74, 158, 255, 0.08);
        }
        .cancel-btn {
            width: 100%;
            padding: 9px;
            background: transparent;
            border: 1px solid var(--border2);
            color: var(--dim);
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.82rem;
            transition: all 0.15s;
        }
        .cancel-btn:hover { color: var(--text); border-color: #444; }

        /* ── Chord section ───────────────────────────────────────── */
        .chord-section {
            border-bottom: 1px solid var(--border);
        }
        .chord-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 32px 12px;
        }
        .section-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--dim);
        }
        .chord-tracks-list {
            padding: 0 32px 20px;
            overflow-x: auto;
        }
        .chord-track-wrap { margin-bottom: 18px; }
        .chord-palette-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 5px;
            flex-wrap: wrap;
        }
        .chord-root-btn, .chord-qual-btn {
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.62rem;
            font-family: inherit;
            letter-spacing: 0.03em;
            font-weight: 600;
            color: var(--dim);
            background: var(--surface2);
            border: 1px solid var(--border2);
            cursor: pointer;
            transition: all 0.1s;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .chord-root-btn:hover, .chord-qual-btn:hover { border-color: #555; color: var(--text); }
        .chord-root-btn.selected { color: #000; font-weight: 700; }
        .chord-qual-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; }

        /* Track header: label + mute + remove */
        .chord-track-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }
        .chord-track-label {
            flex: 1;
            padding-right: 6px;
        }
        .chord-track-name {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--dim);
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chord-track-key {
            font-size: 0.58rem;
            color: #3a3a3a;
            display: block;
            letter-spacing: 0.04em;
        }

        /* Measure rows */
        .chord-measure-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 3px;
        }
        .chord-measure-num {
            width: 96px;
            flex-shrink: 0;
            font-size: 0.55rem;
            color: #2d2d2d;
            text-align: right;
            padding-right: 6px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .chord-measure-pads {
            display: flex;
            gap: 3px;
        }
        .chord-pad {
            width: 34px;
            height: 30px;
            border-radius: 3px;
            border: 1px solid var(--border2);
            cursor: pointer;
            flex-shrink: 0;
            background: var(--surface2);
            transition: filter 0.08s;
            user-select: none;
            -webkit-user-select: none;
        }
        .chord-pad:hover { filter: brightness(1.3); }
        .chord-pad.cp-current {
            outline: 2px solid rgba(255,255,255,0.6);
            outline-offset: -2px;
        }
        .chord-remove-measure {
            width: 22px;
            height: 22px;
            background: transparent;
            border: 1px solid var(--border2);
            color: #2d2d2d;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s;
        }
        .chord-remove-measure:hover:not(:disabled) { border-color: var(--red); color: var(--red); }
        .chord-remove-measure:disabled { opacity: 0.15; cursor: default; }
        .chord-add-row {
            padding-left: 104px;
            margin-top: 6px;
        }
        .chord-add-measure-btn {
            padding: 4px 12px;
            background: transparent;
            border: 1px dashed var(--border2);
            color: #333;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.68rem;
            letter-spacing: 0.05em;
            transition: all 0.15s;
        }
        .chord-add-measure-btn:hover { border-color: var(--accent); color: var(--dim); }
        .chord-section-divider {
            height: 1px;
            background: var(--border);
            margin: 12px 0 16px;
        }

        /* ── Chord modal extras ───────────────────────────────────── */
        .prog-opt {
            padding: 9px 12px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            color: var(--text);
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            text-align: left;
            width: 100%;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .prog-opt:hover { border-color: var(--accent); background: rgba(74,158,255,0.07); }
        .prog-opt-tag {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--dim);
            min-width: 68px;
            flex-shrink: 0;
        }
        .prog-opt-swatches { display: flex; gap: 3px; margin-left: auto; flex-shrink: 0; }
        .prog-swatch {
            width: 8px; height: 8px;
            border-radius: 50%;
        }
        .chord-modal-key-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }
        .key-select {
            background: var(--surface2);
            border: 1px solid var(--border2);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.82rem;
            outline: none;
            cursor: pointer;
        }
        .key-select:focus { border-color: var(--accent); }

        /* ── Mobile ──────────────────────────────────────────────── */
        @media (max-width: 600px) {
            .sequencer { padding: 16px 8px 0; }

            .beat-nums { padding-left: 0; }
            .beat-nums-group { flex: 1; }
            .beat-num { flex: 1; width: auto; }

            .tracks-divider { margin-left: 0; }

            .track { flex-wrap: wrap; gap: 4px 8px; }
            .track-label {
                order: 1;
                flex: 1;
                width: auto;
                text-align: left;
                padding-right: 0;
            }
            .track .mute-btn   { order: 2; }
            .track-remove      { order: 3; }
            .track-pads        { order: 4; width: 100%; }

            .pad-group { flex: 1; }
            .pad { flex: 1; flex-shrink: 1; min-width: 0; width: auto; height: 30px; }

            .chord-section-header { padding: 12px 8px 10px; }
            .chord-tracks-list { padding: 0 8px 16px; }
            .chord-measure-num { display: none; }
            .chord-measure-pads { flex: 1; }
            .chord-pad { flex: 1; flex-shrink: 1; min-width: 0; width: auto; }
            .chord-add-row { padding-left: 0; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <h1>Sequencer</h1>
    <span class="navbar-hint">Space to play / stop</span>
</nav>

<div class="controls">
    <button class="play-btn" id="playBtn" onclick="togglePlay()">&#9654;</button>

    <div class="ctrl-group">
        <label class="ctrl-label">BPM</label>
        <input type="range" class="bpm-slider" id="bpmSlider" min="40" max="240" value="120">
        <span class="bpm-val" id="bpmVal">120</span>
    </div>

    <div class="ctrl-group">
        <label class="ctrl-label">Steps</label>
        <div class="steps-group">
            <button class="steps-btn" onclick="setSteps(4)">4</button>
            <button class="steps-btn" onclick="setSteps(8)">8</button>
            <button class="steps-btn active" onclick="setSteps(16)">16</button>
            <button class="steps-btn" onclick="setSteps(32)">32</button>
        </div>
    </div>

    <div class="ctrl-divider"></div>

    <div class="ctrl-group">
        <label class="ctrl-label">HP</label>
        <input type="range" class="filter-slider" id="hpSlider" min="0" max="100" value="0">
        <span class="filter-val" id="hpVal">20 Hz</span>
    </div>

    <div class="ctrl-group">
        <label class="ctrl-label">LP</label>
        <input type="range" class="filter-slider" id="lpSlider" min="0" max="100" value="100">
        <span class="filter-val" id="lpVal">20 kHz</span>
    </div>

    <div class="ctrl-group">
        <label class="ctrl-label">Reverb</label>
        <input type="range" class="filter-slider" id="reverbSlider" min="0" max="100" value="0">
        <span class="filter-val" id="reverbVal">0%</span>
    </div>
</div>

<div class="chord-section" id="chordSection" style="display:none">
    <div class="chord-section-header">
        <span class="section-title">Chords</span>
    </div>
    <div class="chord-tracks-list" id="chordTracksList"></div>
</div>

<div class="sequencer">
    <div class="tracks-scroll">
        <div class="beat-nums" id="beatNums"></div>
        <div id="tracks"></div>
    </div>
    <div class="empty-state" id="emptyState">No sounds yet — click Add Sound below.</div>
</div>

<div class="add-area" style="display:flex;gap:10px;flex-wrap:wrap">
    <button class="add-btn" onclick="openModal()">+ Add Sound</button>
    <button class="add-btn" onclick="openChordModal()">+ Add Progression</button>
</div>

<div class="overlay" id="chordOverlay" style="display:none" onclick="chordOverlayClick(event)">
    <div class="modal" style="width:380px;max-width:94vw">
        <div class="modal-title">Add Chord Progression</div>
        <div class="chord-modal-key-row">
            <label class="ctrl-label">Key</label>
            <select class="key-select" id="keySelect"></select>
        </div>
        <div id="progressionList" style="display:flex;flex-direction:column;gap:5px;margin-bottom:12px"></div>
        <button class="cancel-btn" onclick="closeChordModal()">Cancel</button>
    </div>
</div>

<div class="overlay" id="overlay" style="display:none" onclick="overlayClick(event)">
    <div class="modal">
        <div class="modal-title">Choose a sound</div>
        <div class="sound-grid" id="soundGrid"></div>
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    </div>
</div>

<script>
    // ── State ──────────────────────────────────────────────────────
    let tracks    = [];
    let steps     = 16;
    let bpm       = 120;
    let playing   = false;
    let step      = 0;
    let nextTime  = 0;
    let timer     = null;
    let seqId     = 0;       // invalidates stale visual callbacks on stop
    let audioCtx  = null;
    let masterHP  = null;
    let masterLP  = null;
    let reverbNode = null;
    let reverbWet  = null;

    const AHEAD    = 0.1;    // seconds to schedule ahead
    const INTERVAL = 25;     // scheduler poll ms

    const SOUNDS = [
        { id: 'kick',    label: 'Kick'          },
        { id: 'snare',   label: 'Snare'         },
        { id: 'clap',    label: 'Clap'          },
        { id: 'hihat_c', label: 'Hi-Hat Closed' },
        { id: 'hihat_o', label: 'Hi-Hat Open'   },
        { id: 'tom_hi',  label: 'Tom Hi'        },
        { id: 'tom_lo',  label: 'Tom Low'       },
        { id: 'rim',     label: 'Rim'           },
    ];

    // ── Audio context ──────────────────────────────────────────────
    function buildIR(ctx) {
        const sr  = ctx.sampleRate;
        const len = sr * 2.5;
        const buf = ctx.createBuffer(2, len, sr);
        for (let ch = 0; ch < 2; ch++) {
            const d = buf.getChannelData(ch);
            for (let i = 0; i < len; i++)
                d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.2);
        }
        return buf;
    }

    function ac() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterHP = audioCtx.createBiquadFilter();
            masterLP = audioCtx.createBiquadFilter();
            masterHP.type = 'highpass';
            masterLP.type = 'lowpass';
            masterHP.frequency.value = 20;
            masterLP.frequency.value = 20000;

            reverbNode = audioCtx.createConvolver();
            reverbNode.buffer = buildIR(audioCtx);
            reverbWet = audioCtx.createGain();
            reverbWet.gain.value = 0;

            // dry path: HP → LP → out
            masterHP.connect(masterLP);
            masterLP.connect(audioCtx.destination);
            // wet path: HP → reverb → wet gain → out
            masterHP.connect(reverbNode);
            reverbNode.connect(reverbWet);
            reverbWet.connect(audioCtx.destination);
        }
        return audioCtx;
    }

    // ── Synthesis helpers ──────────────────────────────────────────
    function synOsc(c, t, type, f0, f1, dur, vol) {
        const o = c.createOscillator();
        const g = c.createGain();
        o.type = type;
        o.frequency.setValueAtTime(f0, t);
        if (f1) o.frequency.exponentialRampToValueAtTime(f1, t + dur);
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        o.connect(g); g.connect(masterHP);
        o.start(t); o.stop(t + dur);
    }

    function synNoise(c, t, dur, filterType, filterHz, vol) {
        const n    = Math.floor(c.sampleRate * dur);
        const buf  = c.createBuffer(1, n, c.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < n; i++) data[i] = Math.random() * 2 - 1;
        const src = c.createBufferSource();
        src.buffer = buf;
        const f = c.createBiquadFilter();
        f.type = filterType; f.frequency.value = filterHz;
        const g = c.createGain();
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        src.connect(f); f.connect(g); g.connect(masterHP);
        src.start(t); src.stop(t + dur);
    }

    // ── Drum sounds ────────────────────────────────────────────────
    function playSound(type, t, vol = 1) {
        const c = ac();
        const v = vol;
        switch (type) {
            case 'kick':
                synOsc(c, t, 'sine', 160, 0.01, 0.5, 1.0 * v);
                break;
            case 'snare':
                synNoise(c, t, 0.22, 'highpass', 1000, 0.85 * v);
                synOsc(c, t, 'triangle', 220, 100, 0.1, 0.5 * v);
                break;
            case 'clap':
                for (let i = 0; i < 3; i++)
                    synNoise(c, t + i * 0.012, 0.12, 'bandpass', 1200, 0.75 * v);
                break;
            case 'hihat_c':
                synNoise(c, t, 0.07, 'highpass', 8000, 0.7 * v);
                break;
            case 'hihat_o':
                synNoise(c, t, 0.38, 'highpass', 7000, 0.65 * v);
                break;
            case 'tom_hi':
                synOsc(c, t, 'sine', 220, 90, 0.35, 0.9 * v);
                break;
            case 'tom_lo':
                synOsc(c, t, 'sine', 140, 55, 0.4, 0.9 * v);
                break;
            case 'rim':
                synOsc(c, t, 'square', 600, null, 0.04, 0.55 * v);
                synNoise(c, t, 0.03, 'highpass', 3000, 0.4 * v);
                break;
        }
    }

    // ── Scheduler ─────────────────────────────────────────────────
    function stepDur() { return (60 / bpm) * (4 / steps); }

    function tick() {
        const c = ac();
        while (nextTime < c.currentTime + AHEAD) {
            const s   = step;
            const id  = seqId;
            const delay = Math.max(0, (nextTime - c.currentTime) * 1000);

            tracks.forEach(tr => {
                if (!tr.muted && tr.pads[s]) playSound(tr.type, nextTime, tr.volumes[s] ?? 1);
            });

            chordTracks.forEach(ct => {
                if (ct.muted) return;
                const cs = s % ct.pads.length;
                const cp = ct.pads[cs];
                if (cp) playChordStab(getChordNotes(cp.root, cp.q), nextTime, ct.vols[cs] ?? 1);
            });

            setTimeout(() => {
                if (seqId !== id) return;
                document.querySelectorAll('.pad.current').forEach(p => p.classList.remove('current'));
                document.querySelectorAll(`.pad[data-step="${s}"]`).forEach(p => p.classList.add('current'));
                document.querySelectorAll('.chord-pad.cp-current').forEach(p => p.classList.remove('cp-current'));
                chordTracks.forEach(ct => {
                    const cs = s % ct.pads.length;
                    document.querySelectorAll(`.chord-pad[data-track="${ct.id}"][data-step="${cs}"]`).forEach(p => p.classList.add('cp-current'));
                });
            }, delay);

            nextTime += stepDur();
            step = (step + 1) % steps;
        }
        timer = setTimeout(tick, INTERVAL);
    }

    // ── Play / Stop ────────────────────────────────────────────────
    function togglePlay() {
        const c = ac();
        if (c.state === 'suspended') c.resume();
        playing = !playing;
        const btn = document.getElementById('playBtn');
        if (playing) {
            step     = 0;
            nextTime = c.currentTime;
            tick();
            btn.innerHTML = '&#9632;';
            btn.classList.add('playing');
        } else {
            seqId++;
            clearTimeout(timer);
            document.querySelectorAll('.pad.current').forEach(p => p.classList.remove('current'));
            document.querySelectorAll('.chord-pad.cp-current').forEach(p => p.classList.remove('cp-current'));
            btn.innerHTML = '&#9654;';
            btn.classList.remove('playing');
        }
    }

    document.getElementById('bpmSlider').addEventListener('input', e => {
        bpm = parseInt(e.target.value);
        document.getElementById('bpmVal').textContent = bpm;
    });

    function sliderToFreq(val, min, max) {
        return Math.round(min * Math.pow(max / min, val / 100));
    }

    function fmtFreq(hz) {
        return hz >= 1000 ? (hz / 1000).toFixed(1) + ' kHz' : hz + ' Hz';
    }

    document.getElementById('hpSlider').addEventListener('input', e => {
        const freq = sliderToFreq(+e.target.value, 20, 8000);
        document.getElementById('hpVal').textContent = fmtFreq(freq);
        if (masterHP) masterHP.frequency.value = freq;
    });

    document.getElementById('lpSlider').addEventListener('input', e => {
        const freq = sliderToFreq(+e.target.value, 200, 20000);
        document.getElementById('lpVal').textContent = fmtFreq(freq);
        if (masterLP) masterLP.frequency.value = freq;
    });

    document.getElementById('reverbSlider').addEventListener('input', e => {
        const val = +e.target.value / 100;
        document.getElementById('reverbVal').textContent = e.target.value + '%';
        if (reverbWet) reverbWet.gain.value = val * 0.85;
    });

    function setSteps(n) {
        steps = n;
        if (step >= n) step = 0;
        tracks.forEach(tr => {
            if (tr.pads.length < n) {
                while (tr.pads.length < n) { tr.pads.push(false); tr.volumes.push(1); }
            } else {
                tr.pads    = tr.pads.slice(0, n);
                tr.volumes = tr.volumes.slice(0, n);
            }
        });
        document.querySelectorAll('.steps-btn').forEach(b =>
            b.classList.toggle('active', parseInt(b.textContent) === n)
        );
        render();
    }

    // ── Tracks ────────────────────────────────────────────────────
    function addTrack(type, label) {
        tracks.push({ id: Date.now(), type, label, muted: false, pads: Array(steps).fill(false), volumes: Array(steps).fill(1) });
        render();
        closeModal();
    }

    function removeTrack(id) {
        tracks = tracks.filter(t => t.id !== id);
        render();
    }

    function toggleMute(id) {
        const tr = tracks.find(t => t.id === id);
        if (!tr) return;
        tr.muted = !tr.muted;
        const btn = document.querySelector(`.mute-btn[data-track="${id}"]`);
        if (btn) btn.classList.toggle('muted', tr.muted);
    }

    function toggleChordMute(id) {
        const ct = chordTracks.find(t => t.id === id);
        if (!ct) return;
        ct.muted = !ct.muted;
        const btn = document.querySelector(`.mute-btn[data-chord-track="${id}"]`);
        if (btn) btn.classList.toggle('muted', ct.muted);
    }

    function togglePad(trackId, s) {
        const tr = tracks.find(t => t.id === trackId);
        if (!tr) return;
        tr.pads[s] = !tr.pads[s];
        const pad = document.querySelector(`.pad[data-track="${trackId}"][data-step="${s}"]`);
        if (pad) {
            pad.classList.toggle('lit', tr.pads[s]);
            pad.style.opacity = tr.pads[s] ? padOpacity(tr.volumes[s]) : '';
        }
    }

    // ── Render ────────────────────────────────────────────────────
    function render() {
        const tracksEl  = document.getElementById('tracks');
        const numsEl    = document.getElementById('beatNums');
        const emptyEl   = document.getElementById('emptyState');
        tracksEl.innerHTML = '';

        if (tracks.length === 0) {
            emptyEl.style.display = 'block';
            numsEl.innerHTML = '';
            return;
        }
        emptyEl.style.display = 'none';

        const groups = Math.ceil(steps / 4);

        // Beat numbers
        numsEl.innerHTML = '';
        for (let g = 0; g < groups; g++) {
            const grp = document.createElement('div');
            grp.className = 'beat-nums-group';
            const start = g * 4;
            const end   = Math.min(start + 4, steps);
            for (let i = start; i < end; i++) {
                const n = document.createElement('div');
                n.className = 'beat-num' + (i % 4 === 0 ? ' major' : '');
                n.textContent = i + 1;
                grp.appendChild(n);
            }
            numsEl.appendChild(grp);
        }

        // Track rows
        tracks.forEach((tr, idx) => {
            const row = document.createElement('div');
            row.className = 'track';

            const label = document.createElement('div');
            label.className = 'track-label';
            label.textContent = tr.label;
            row.appendChild(label);

            const padsRow = document.createElement('div');
            padsRow.className = 'track-pads';

            for (let g = 0; g < groups; g++) {
                const grp   = document.createElement('div');
                grp.className = 'pad-group';
                const start = g * 4;
                const end   = Math.min(start + 4, steps);
                for (let i = start; i < end; i++) {
                    const pad = document.createElement('div');
                    let cls = 'pad';
                    if (tr.pads[i])  cls += ' lit';
                    if (i % 4 === 0) cls += ' downbeat';
                    pad.className = cls;
                    pad.dataset.track = tr.id;
                    pad.dataset.step  = i;
                    if (tr.pads[i]) pad.style.opacity = padOpacity(tr.volumes[i]);
                    pad.addEventListener('mousedown',  e => startDrag(true, tr.id, i, e));
                    pad.addEventListener('touchstart', e => startDrag(true, tr.id, i, e), {passive: false});
                    grp.appendChild(pad);
                }
                padsRow.appendChild(grp);
            }
            row.appendChild(padsRow);

            const mute = document.createElement('button');
            mute.className = 'mute-btn' + (tr.muted ? ' muted' : '');
            mute.textContent = 'M';
            mute.title = 'Mute';
            mute.dataset.track = tr.id;
            mute.onclick = () => toggleMute(tr.id);
            row.appendChild(mute);

            const rm = document.createElement('button');
            rm.className = 'track-remove';
            rm.textContent = '×';
            rm.onclick = () => removeTrack(tr.id);
            row.appendChild(rm);

            tracksEl.appendChild(row);

            // Divider between tracks (not after last)
            if (idx < tracks.length - 1) {
                const div = document.createElement('div');
                div.className = 'tracks-divider';
                tracksEl.appendChild(div);
            }
        });
    }

    // ── Modal ──────────────────────────────────────────────────────
    function openModal() {
        const grid = document.getElementById('soundGrid');
        grid.innerHTML = '';
        SOUNDS.forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'sound-opt';
            btn.textContent = s.label;
            btn.onclick = () => addTrack(s.id, s.label);
            grid.appendChild(btn);
        });
        document.getElementById('overlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('overlay').style.display = 'none';
    }

    function overlayClick(e) {
        if (e.target === document.getElementById('overlay')) closeModal();
    }

    // ── Chord data ─────────────────────────────────────────────────
    const NOTE_NAMES = ['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];

    const CHORD_INTERVALS = {
        'maj':   [0,4,7],   'min':   [0,3,7],
        'dom7':  [0,4,7,10],'maj7':  [0,4,7,11],
        'min7':  [0,3,7,10],'dim':   [0,3,6],
        'dim7':  [0,3,6,9], 'aug':   [0,4,8],
        'sus2':  [0,2,7],   'sus4':  [0,5,7],
        '7sus4': [0,5,7,10],'hdim7': [0,3,6,10],
    };

    const QUALITY_LABEL = {
        'maj':'','min':'m','dom7':'7','maj7':'M7','min7':'m7',
        'dim':'°','dim7':'°7','aug':'+','sus2':'sus2','sus4':'sus4',
        '7sus4':'7sus4','hdim7':'ø7',
    };

    // One color per chromatic root note
    const ROOT_COLORS = [
        '#4a9eff', // C
        '#7c6ff7', // C#
        '#c36bdd', // D
        '#e05b94', // Eb
        '#e05555', // E
        '#e07845', // F
        '#e0b830', // F#
        '#8bc34a', // G
        '#26c6da', // Ab
        '#29b6f6', // A
        '#5c6bc0', // Bb
        '#66bb6a', // B
    ];

    const CHORD_QUALITIES = [
        {q:'maj',  l:'maj'},  {q:'min',   l:'min'},
        {q:'dom7', l:'7'},    {q:'maj7',  l:'maj7'},
        {q:'min7', l:'min7'}, {q:'dim',   l:'dim'},
        {q:'dim7', l:'dim7'}, {q:'aug',   l:'aug'},
        {q:'sus2', l:'sus2'}, {q:'sus4',  l:'sus4'},
        {q:'7sus4',l:'7sus4'},{q:'hdim7', l:'ø7'},
    ];

    const PROGRESSIONS = [
        { name:'I – V – vi – IV',    tag:'Pop',
          chords:[{s:0,q:'maj',r:'I'},{s:7,q:'maj',r:'V'},{s:9,q:'min',r:'vi'},{s:5,q:'maj',r:'IV'}] },
        { name:'I – IV – V – I',     tag:'Classic',
          chords:[{s:0,q:'maj',r:'I'},{s:5,q:'maj',r:'IV'},{s:7,q:'maj',r:'V'},{s:0,q:'maj',r:'I'}] },
        { name:'ii7 – V7 – Imaj7',   tag:'Jazz',
          chords:[{s:2,q:'min7',r:'ii7'},{s:7,q:'dom7',r:'V7'},{s:0,q:'maj7',r:'Imaj7'}] },
        { name:'I – vi – IV – V',    tag:'50s',
          chords:[{s:0,q:'maj',r:'I'},{s:9,q:'min',r:'vi'},{s:5,q:'maj',r:'IV'},{s:7,q:'maj',r:'V'}] },
        { name:'i – VII – VI – VII', tag:'Minor Rock',
          chords:[{s:0,q:'min',r:'i'},{s:10,q:'maj',r:'VII'},{s:8,q:'maj',r:'VI'},{s:10,q:'maj',r:'VII'}] },
        { name:'I7 – IV7 – I7 – V7', tag:'Blues',
          chords:[{s:0,q:'dom7',r:'I7'},{s:5,q:'dom7',r:'IV7'},{s:0,q:'dom7',r:'I7'},{s:7,q:'dom7',r:'V7'}] },
        { name:'i – iv – VII – III', tag:'Dorian',
          chords:[{s:0,q:'min',r:'i'},{s:5,q:'min',r:'iv'},{s:10,q:'maj',r:'VII'},{s:3,q:'maj',r:'III'}] },
        { name:'I – iii – IV – V',   tag:'Classic Rock',
          chords:[{s:0,q:'maj',r:'I'},{s:4,q:'min',r:'iii'},{s:5,q:'maj',r:'IV'},{s:7,q:'maj',r:'V'}] },
        { name:'i – VI – III – VII', tag:'Andalusian',
          chords:[{s:0,q:'min',r:'i'},{s:8,q:'maj',r:'VI'},{s:3,q:'maj',r:'III'},{s:10,q:'maj',r:'VII'}] },
        { name:'Imaj7 – IVmaj7 – ii7 – V7', tag:'Gospel',
          chords:[{s:0,q:'maj7',r:'Imaj7'},{s:5,q:'maj7',r:'IVmaj7'},{s:2,q:'min7',r:'ii7'},{s:7,q:'dom7',r:'V7'}] },
    ];

    // ── Chord state ─────────────────────────────────────────────────
    let chordTracks = [];

    // ── Chord helpers ───────────────────────────────────────────────
    function noteFreq(semi) {
        return 440 * Math.pow(2, (48 + semi - 69) / 12); // semi 0 = C3
    }

    function getChordNotes(rootSemi, quality) {
        return (CHORD_INTERVALS[quality] || CHORD_INTERVALS['maj']).map(i => noteFreq(rootSemi + i));
    }

    function playChordStab(notes, t, vol = 1) {
        const c = ac();
        const g = c.createGain();
        g.gain.setValueAtTime(0.15 * vol, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
        g.connect(masterHP);
        notes.forEach(freq => {
            const o = c.createOscillator();
            o.type = 'triangle';
            o.frequency.value = freq;
            o.connect(g);
            o.start(t); o.stop(t + 0.5);
        });
    }

    function buildChordTrack(progIdx, key) {
        const prog    = PROGRESSIONS[progIdx];
        const keySemi = NOTE_NAMES.indexOf(key);

        // Place each chord only on the first beat of each measure (every 4 steps)
        const pads = Array(steps).fill(null);
        const measures = Math.max(1, Math.floor(steps / 4));
        for (let m = 0; m < measures; m++) {
            const ch = prog.chords[m % prog.chords.length];
            pads[m * 4] = { root: (keySemi + ch.s) % 12, q: ch.q };
        }

        const vols = Array(steps).fill(1);
        // Default brush = first chord of progression in this key
        const firstCh = prog.chords[0];
        const selectedChord = { root: (keySemi + firstCh.s) % 12, q: firstCh.q };
        return { id: Date.now(), key, progIdx, name: prog.name, tag: prog.tag, pads, vols, selectedChord, muted: false };
    }

    // ── Chord track interactions ────────────────────────────────────
    function addChordTrack(progIdx, key) {
        chordTracks.push(buildChordTrack(progIdx, key));
        renderChordTracks();
        closeChordModal();
    }

    function removeChordTrack(id) {
        chordTracks = chordTracks.filter(t => t.id !== id);
        renderChordTracks();
    }

    function addChordMeasure(id) {
        const ct = chordTracks.find(t => t.id === id);
        if (!ct) return;
        for (let i = 0; i < 4; i++) { ct.pads.push(null); ct.vols.push(1); }
        renderChordTracks();
    }

    function removeChordMeasure(id, measureIdx) {
        const ct = chordTracks.find(t => t.id === id);
        if (!ct || ct.pads.length <= 4) return;
        ct.pads.splice(measureIdx * 4, 4);
        ct.vols.splice(measureIdx * 4, 4);
        renderChordTracks();
    }

    function selectChordRoot(trackId, root) {
        const ct = chordTracks.find(t => t.id === trackId);
        if (!ct) return;
        ct.selectedChord = { ...ct.selectedChord, root };
        const color = ROOT_COLORS[root];
        document.querySelectorAll(`.chord-root-btn[data-track="${trackId}"]`).forEach((b, i) => {
            const sel = i === root;
            b.classList.toggle('selected', sel);
            b.style.background  = sel ? color : '';
            b.style.borderColor = sel ? color : '';
            b.style.color       = sel ? '#000' : '';
        });
        // Tint quality row to match new root color
        document.querySelectorAll(`.chord-qual-btn.selected[data-track="${trackId}"]`).forEach(b => {
            b.style.background  = color;
            b.style.borderColor = color;
        });
    }

    function selectChordQual(trackId, q) {
        const ct = chordTracks.find(t => t.id === trackId);
        if (!ct) return;
        ct.selectedChord = { ...ct.selectedChord, q };
        const color = ROOT_COLORS[ct.selectedChord.root];
        document.querySelectorAll(`.chord-qual-btn[data-track="${trackId}"]`).forEach(b => {
            const sel = b.dataset.q === q;
            b.classList.toggle('selected', sel);
            b.style.background  = sel ? color : '';
            b.style.borderColor = sel ? color : '';
            b.style.color       = sel ? '#fff' : '';
        });
    }

    function paintChordPad(trackId, stepIdx) {
        const ct = chordTracks.find(t => t.id === trackId);
        if (!ct) return;
        const sc  = ct.selectedChord;
        const cur = ct.pads[stepIdx];
        const isSame = cur && cur.root === sc.root && cur.q === sc.q;
        ct.pads[stepIdx] = isSame ? null : { root: sc.root, q: sc.q };
        const pad = document.querySelector(`.chord-pad[data-track="${trackId}"][data-step="${stepIdx}"]`);
        if (pad) applyChordPadColor(pad, ct.pads[stepIdx], ct.vols[stepIdx]);
    }

    function padOpacity(vol) { return 0.25 + vol * 0.75; }

    function applyChordPadColor(pad, chord, vol = 1) {
        const color = chord ? ROOT_COLORS[chord.root] : '';
        pad.style.background  = color;
        pad.style.borderColor = color;
        pad.style.opacity     = chord ? (0.2 + vol * 0.8) : '';
    }

    // ── Render chord tracks ─────────────────────────────────────────
    function renderChordTracks() {
        const el      = document.getElementById('chordTracksList');
        const section = document.getElementById('chordSection');
        el.innerHTML  = '';

        if (chordTracks.length === 0) { section.style.display = 'none'; return; }
        section.style.display = 'block';

        chordTracks.forEach((tr, tIdx) => {
            const wrap = document.createElement('div');
            wrap.className = 'chord-track-wrap';

            // Root-note row
            const rootRow = document.createElement('div');
            rootRow.className = 'chord-palette-row';
            NOTE_NAMES.forEach((name, ri) => {
                const btn = document.createElement('button');
                const sel = ri === tr.selectedChord.root;
                const color = ROOT_COLORS[ri];
                btn.className = 'chord-root-btn' + (sel ? ' selected' : '');
                btn.textContent = name;
                btn.dataset.track = tr.id;
                if (sel) { btn.style.background = color; btn.style.borderColor = color; btn.style.color = '#000'; }
                btn.onclick = () => selectChordRoot(tr.id, ri);
                rootRow.appendChild(btn);
            });
            wrap.appendChild(rootRow);

            // Quality row
            const qualRow = document.createElement('div');
            qualRow.className = 'chord-palette-row';
            const selColor = ROOT_COLORS[tr.selectedChord.root];
            CHORD_QUALITIES.forEach(cq => {
                const btn = document.createElement('button');
                const sel = cq.q === tr.selectedChord.q;
                btn.className = 'chord-qual-btn' + (sel ? ' selected' : '');
                btn.textContent = cq.l;
                btn.dataset.track = tr.id;
                btn.dataset.q = cq.q;
                if (sel) { btn.style.background = selColor; btn.style.borderColor = selColor; btn.style.color = '#fff'; }
                btn.onclick = () => selectChordQual(tr.id, cq.q);
                qualRow.appendChild(btn);
            });
            wrap.appendChild(qualRow);

            // Header: label + mute + remove-track
            const header = document.createElement('div');
            header.className = 'chord-track-header';

            const labelEl = document.createElement('div');
            labelEl.className = 'chord-track-label';
            const nameSpan = document.createElement('span');
            nameSpan.className = 'chord-track-name';
            nameSpan.textContent = tr.tag;
            nameSpan.title = tr.name;
            const keySpan = document.createElement('span');
            keySpan.className = 'chord-track-key';
            keySpan.textContent = 'key of ' + tr.key;
            labelEl.appendChild(nameSpan);
            labelEl.appendChild(keySpan);
            header.appendChild(labelEl);

            const mute = document.createElement('button');
            mute.className = 'mute-btn' + (tr.muted ? ' muted' : '');
            mute.textContent = 'M';
            mute.title = 'Mute';
            mute.dataset.chordTrack = tr.id;
            mute.onclick = () => toggleChordMute(tr.id);
            header.appendChild(mute);

            const rmTrack = document.createElement('button');
            rmTrack.className = 'track-remove';
            rmTrack.textContent = '×';
            rmTrack.onclick = () => removeChordTrack(tr.id);
            header.appendChild(rmTrack);

            wrap.appendChild(header);

            // One row per measure (4 pads each)
            const numMeasures = Math.ceil(tr.pads.length / 4);
            for (let m = 0; m < numMeasures; m++) {
                const mRow = document.createElement('div');
                mRow.className = 'chord-measure-row';

                const numEl = document.createElement('div');
                numEl.className = 'chord-measure-num';
                numEl.textContent = 'bar ' + (m + 1);
                mRow.appendChild(numEl);

                const padsEl = document.createElement('div');
                padsEl.className = 'chord-measure-pads';
                const start = m * 4, end = Math.min(start + 4, tr.pads.length);
                for (let i = start; i < end; i++) {
                    const pad = document.createElement('div');
                    pad.className = 'chord-pad';
                    pad.dataset.track = tr.id;
                    pad.dataset.step  = i;
                    if (tr.pads[i]) applyChordPadColor(pad, tr.pads[i], tr.vols[i]);
                    pad.addEventListener('mousedown',  e => startDrag(false, tr.id, i, e));
                    pad.addEventListener('touchstart', e => startDrag(false, tr.id, i, e), {passive: false});
                    padsEl.appendChild(pad);
                }
                mRow.appendChild(padsEl);

                const rmMeasure = document.createElement('button');
                rmMeasure.className = 'chord-remove-measure';
                rmMeasure.textContent = '−';
                rmMeasure.title = 'Remove bar';
                rmMeasure.disabled = tr.pads.length <= 4;
                rmMeasure.onclick = () => removeChordMeasure(tr.id, m);
                mRow.appendChild(rmMeasure);

                wrap.appendChild(mRow);
            }

            // Add measure button
            const addRow = document.createElement('div');
            addRow.className = 'chord-add-row';
            const addBtn = document.createElement('button');
            addBtn.className = 'chord-add-measure-btn';
            addBtn.textContent = '+ Add Bar';
            addBtn.onclick = () => addChordMeasure(tr.id);
            addRow.appendChild(addBtn);
            wrap.appendChild(addRow);

            if (tIdx < chordTracks.length - 1) {
                const div = document.createElement('div');
                div.className = 'chord-section-divider';
                wrap.appendChild(div);
            }
            el.appendChild(wrap);
        });
    }

    // ── Chord modal ─────────────────────────────────────────────────
    function openChordModal() {
        const keySelect = document.getElementById('keySelect');
        keySelect.innerHTML = '';
        NOTE_NAMES.forEach(k => {
            const opt = document.createElement('option');
            opt.value = opt.textContent = k;
            keySelect.appendChild(opt);
        });
        keySelect.addEventListener('change', buildProgressionList);

        buildProgressionList();
        document.getElementById('chordOverlay').style.display = 'flex';
    }

    function buildProgressionList() {
        const key  = document.getElementById('keySelect').value;
        const list = document.getElementById('progressionList');
        list.innerHTML = '';
        PROGRESSIONS.forEach((p, i) => {
            const btn = document.createElement('button');
            btn.className = 'prog-opt';
            const tag  = document.createElement('span');
            tag.className = 'prog-opt-tag';
            tag.textContent = p.tag;
            const name = document.createElement('span');
            name.textContent = p.name;
            name.style.flex = '1';
            const swatches = document.createElement('span');
            swatches.className = 'prog-opt-swatches';
            p.chords.forEach((ch, ci) => {
                const keySemi = NOTE_NAMES.indexOf(document.getElementById('keySelect')?.value || 'C');
                const dot = document.createElement('span');
                dot.className = 'prog-swatch';
                dot.style.background = ROOT_COLORS[(keySemi + ch.s) % 12];
                swatches.appendChild(dot);
            });
            btn.appendChild(tag); btn.appendChild(name); btn.appendChild(swatches);
            btn.onclick = () => addChordTrack(i, document.getElementById('keySelect').value);
            list.appendChild(btn);
        });
    }

    function closeChordModal() { document.getElementById('chordOverlay').style.display = 'none'; }
    function chordOverlayClick(e) { if (e.target === document.getElementById('chordOverlay')) closeChordModal(); }

    // ── Pad drag-to-volume ─────────────────────────────────────────
    let dragState = null;

    function startDrag(isDrum, trackId, step, e) {
        if (e.button !== undefined && e.button !== 0) return; // left-click / touch only
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        let wasOn, startVol;
        if (isDrum) {
            const tr = tracks.find(t => t.id === trackId);
            wasOn    = !!tr.pads[step];
            startVol = wasOn ? (tr.volumes[step] ?? 1) : 1;
        } else {
            const ct = chordTracks.find(t => t.id === trackId);
            wasOn    = ct.pads[step] !== null;
            startVol = wasOn ? (ct.vols[step] ?? 1) : 1;
        }
        dragState = { isDrum, trackId, step, startY: clientY, startVol, wasOn, hasDragged: false };
        e.preventDefault();
    }

    function onDragMove(e) {
        if (!dragState) return;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const dy = clientY - dragState.startY;
        if (Math.abs(dy) > 4) dragState.hasDragged = true;
        if (!dragState.hasDragged || !dragState.wasOn) return;

        const newVol = Math.max(0.05, Math.min(1, dragState.startVol - dy / 130));
        if (dragState.isDrum) {
            const tr = tracks.find(t => t.id === dragState.trackId);
            if (tr) {
                tr.volumes[dragState.step] = newVol;
                const pad = document.querySelector(`.pad[data-track="${dragState.trackId}"][data-step="${dragState.step}"]`);
                if (pad) pad.style.opacity = padOpacity(newVol);
            }
        } else {
            const ct = chordTracks.find(t => t.id === dragState.trackId);
            if (ct) {
                ct.vols[dragState.step] = newVol;
                const pad = document.querySelector(`.chord-pad[data-track="${dragState.trackId}"][data-step="${dragState.step}"]`);
                if (pad) pad.style.opacity = 0.2 + newVol * 0.8;
            }
        }
        if (e.cancelable) e.preventDefault();
    }

    function onDragEnd() {
        if (!dragState) return;
        const ds = dragState;
        dragState = null;
        if (!ds.hasDragged) {
            if (ds.isDrum) togglePad(ds.trackId, ds.step);
            else paintChordPad(ds.trackId, ds.step);
        }
    }

    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup',   onDragEnd);
    document.addEventListener('touchmove', onDragMove, { passive: false });
    document.addEventListener('touchend',  onDragEnd);

    // ── Keyboard ───────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
        if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
            e.preventDefault();
            togglePlay();
        }
    });

    // ── Init ───────────────────────────────────────────────────────
    render();
</script>
</body>
</html>
